name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Manually fix useChat.ts duplicated imports
        run: |
          # Completely recreate the file to ensure no duplicate imports
          cat > src/hooks/chat/useChat.ts << 'EOF'
          import { useRef, useState } from "react";
          import { GuidanceCategory } from "@/services/ai";
          import { useAuthCheck } from "./useAuthCheck";
          import { useAssessmentData } from "./useAssessmentData";
          import { useMessages } from "./useMessages";
          import { useSendMessage } from "./useSendMessage";
          import { useMessagePersistence } from "@/hooks/useMessagePersistence";
          
          export function useChat(initialCategory: GuidanceCategory = "general") {
            const [category, setCategory] = useState<GuidanceCategory>(initialCategory);
            const inputRef = useRef<HTMLInputElement>(null);
            
            // Auth checking
            const { user, isCheckingAuth } = useAuthCheck();
            
            // Assessment data loading
            const { assessmentData } = useAssessmentData(user, category);
            
            // Messages handling
            const { messages, setMessages, messagesEndRef, clearMessages } = useMessages(category, assessmentData);
            
            // Message sending
            const { 
              inputValue, 
              setInputValue, 
              isLoading, 
              handleSend, 
              handleKeyDown,
              sendInitialPrompt 
            } = useSendMessage(messages, setMessages, category, user, assessmentData, inputRef);
            
            const handleCategoryChange = (value: string) => {
              const newCategory = value as GuidanceCategory;
              
              // Only process change if category actually changes
              if (newCategory !== category) {
                setCategory(newCategory);
                
                // Clear existing messages
                clearMessages();
              }
            };
          
            const clearChat = () => {
              clearMessages();
            };
          
            return {
              messages,
              inputValue,
              setInputValue,
              isLoading,
              category,
              user,
              isCheckingAuth,
              messagesEndRef,
              inputRef,
              handleSend,
              handleKeyDown,
              handleCategoryChange,
              clearChat,
              assessmentData,
            };
          }
          EOF
          echo "Fixed useChat.ts file"
      
      - name: Create SPA redirects for Netlify
        run: |
          mkdir -p public
          echo "/* /index.html 200" > public/_redirects
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_USE_REAL_AI: true
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
      
      - name: Create netlify.toml
        run: |
          cat > netlify.toml << EOF
          [build]
            publish = "dist"
            command = "npm run build"

          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200

          [build.environment]
            VITE_API_URL = "/api"
          EOF
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 