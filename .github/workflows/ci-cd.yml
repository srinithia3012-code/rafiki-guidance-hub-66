name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Delete package-lock.json to force regeneration
        run: rm -f package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Debug environment
        run: |
          echo "NODE_ENV: $NODE_ENV"
          echo "Base path: /rafiki-guidance-hub-66/"
          echo "Current directory: $(pwd)"
          ls -la

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://mhbhyimkykyvuphbefwg.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oYmh5aW1reWt5dnVwaGJlZndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE3NjE3MjEsImV4cCI6MjA1NzMzNzcyMX0.q42WQ2LzGfzxch1ghkMOoArCGNo0jxfiqOwY9SQsXnQ"
          VITE_USE_REAL_AI: "true"
          VITE_API_URL: ${{ secrets.VITE_API_URL || '' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || '' }}
          VITE_GITHUB_ACTIONS: "true"
      
      - name: Debug build output
        run: |
          echo "Build output directory content:"
          ls -la dist/
          echo "index.html content:"
          cat dist/index.html
      
      - name: Prepare for deployment
        run: |
          # Create 404.html file that redirects to index.html for SPA routing
          cp dist/index.html dist/404.html
          
          # Fix paths in index.html if needed
          sed -i 's|src="/|src="/rafiki-guidance-hub-66/|g' dist/index.html
          sed -i 's|href="/|href="/rafiki-guidance-hub-66/|g' dist/index.html
          
          # Exclude paths that already have the prefix
          sed -i 's|href="/rafiki-guidance-hub-66/rafiki-guidance-hub-66/|href="/rafiki-guidance-hub-66/|g' dist/index.html
          sed -i 's|src="/rafiki-guidance-hub-66/rafiki-guidance-hub-66/|src="/rafiki-guidance-hub-66/|g' dist/index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
