name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Print Env Vars for debugging
        run: |
          echo "PROJECT_ID: ${{ secrets.VITE_SUPABASE_URL }}"
          echo "Has ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY != '' }}"
      
      - name: Manually fix useChat.ts duplicated imports
        run: |
          # Completely recreate the file to ensure no duplicate imports
          cat > src/hooks/chat/useChat.ts << 'EOF'
          import { useRef, useState } from "react";
          import { GuidanceCategory } from "@/services/ai";
          import { useAuthCheck } from "./useAuthCheck";
          import { useAssessmentData } from "./useAssessmentData";
          import { useMessages } from "./useMessages";
          import { useSendMessage } from "./useSendMessage";
          import { useMessagePersistence } from "@/hooks/useMessagePersistence";
          
          export function useChat(initialCategory: GuidanceCategory = "general") {
            const [category, setCategory] = useState<GuidanceCategory>(initialCategory);
            const inputRef = useRef<HTMLInputElement>(null);
            
            // Auth checking
            const { user, isCheckingAuth } = useAuthCheck();
            
            // Assessment data loading
            const { assessmentData } = useAssessmentData(user, category);
            
            // Messages handling
            const { messages, setMessages, messagesEndRef, clearMessages } = useMessages(category, assessmentData);
            
            // Message sending
            const { 
              inputValue, 
              setInputValue, 
              isLoading, 
              handleSend, 
              handleKeyDown
            } = useSendMessage(messages, setMessages, category, user, assessmentData, inputRef);
            
            const handleCategoryChange = (value: string) => {
              const newCategory = value as GuidanceCategory;
              
              // Only process change if category actually changes
              if (newCategory !== category) {
                setCategory(newCategory);
                
                // Clear existing messages
                clearMessages();
              }
            };
          
            const clearChat = () => {
              clearMessages();
            };
          
            return {
              messages,
              inputValue,
              setInputValue,
              isLoading,
              category,
              user,
              isCheckingAuth,
              messagesEndRef,
              inputRef,
              handleSend,
              handleKeyDown,
              handleCategoryChange,
              clearChat,
              assessmentData,
            };
          }
          EOF
          echo "Fixed useChat.ts file"
      
      - name: Create SPA redirects for GitHub Pages
        run: |
          mkdir -p public
          echo '<!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Rafiki Guidance Hub</title>
              <script type="text/javascript">
                // Single Page Apps for GitHub Pages
                // MIT License
                // https://github.com/rafgraph/spa-github-pages
                // This script takes the current url and converts the path and query
                // string into just a query string, and then redirects the browser
                // to the new url with only a query string and hash fragment,
                // e.g. https://www.foo.tld/one/two?a=b&c=d#qwe, becomes
                // https://www.foo.tld/?/one/two&a=b~and~c=d#qwe
                // Note: this 404.html file must be at least 512 bytes for it to work
                // with Internet Explorer (it is currently > 512 bytes)

                // If you're creating a Project Pages site and NOT using a custom domain,
                // then set pathSegmentsToKeep to 1 (enterprise users may need to set it to > 1).
                // This way the code will only replace the route part of the path, and not
                // the real directory in which the app resides, for example:
                // https://username.github.io/repo-name/one/two?a=b&c=d#qwe becomes
                // https://username.github.io/repo-name/?/one/two&a=b~and~c=d#qwe
                // Otherwise, leave pathSegmentsToKeep as 0.
                var pathSegmentsToKeep = 1;

                var l = window.location;
                l.replace(
                  l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
                  l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
                  l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
                  (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
                  l.hash
                );

              </script>
            </head>
            <body>
            </body>
          </html>' > public/404.html
          echo '/* /index.html 200' > public/_redirects
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://mhbhyimkykyvuphbefwg.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oYmh5aW1reWt5dnVwaGJlZndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE3NjE3MjEsImV4cCI6MjA1NzMzNzcyMX0.q42WQ2LzGfzxch1ghkMOoArCGNo0jxfiqOwY9SQsXnQ"
          VITE_USE_REAL_AI: true
          VITE_API_URL: ${{ secrets.VITE_API_URL || '' }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || '' }}
      
      - name: Create netlify.toml
        run: |
          cat > netlify.toml << EOF
          [build]
            publish = "dist"
            command = "npm run build"

          [[redirects]]
            from = "/*"
            to = "/index.html"
            status = 200

          [build.environment]
            VITE_API_URL = "/api"
          EOF
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
