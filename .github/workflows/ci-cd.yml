name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # Trigger deployment on push to main branch
  pull_request:
    branches: [ main ] # Run checks on PRs targeting main

permissions:
  contents: read
  pages: write # Needed to deploy to GitHub Pages
  id-token: write # Needed for OIDC token if required by deployment target

jobs:
  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # URL to the deployed page

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use Node.js version 20. Adjust if needed.
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Use 'ci' for cleaner installs in CI

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          # Add any other VITE_ variables needed for the build here
          # echo "VITE_OTHER_VAR=${{ secrets.VITE_OTHER_VAR }}" >> .env
        env:
          # These secrets MUST be set in your repository settings
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Lint code
        run: npm run lint

      - name: Build application
        # Extract repo name for base path (e.g., 'my-repo' from 'owner/my-repo')
        run: |
          REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          echo "Building with base URL: /${REPO_NAME}/"
          npm run build -- --base=/${REPO_NAME}/
        env:
          # Ensure build uses environment variables if needed via import.meta.env
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the 'dist' directory (standard output for Vite build)
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 