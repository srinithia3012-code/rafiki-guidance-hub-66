
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Create SPA redirect files for GitHub Pages
        run: |
          mkdir -p public
          
          # Create 404.html file for SPA routing
          cat > public/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Rafiki Guidance Hub</title>
              <script type="text/javascript">
                // Single Page Apps for GitHub Pages
                // MIT License
                // https://github.com/rafgraph/spa-github-pages
                var pathSegmentsToKeep = 1;

                var l = window.location;
                l.replace(
                  l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
                  l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
                  l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
                  (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
                  l.hash
                );
              </script>
            </head>
            <body>
            </body>
          </html>
          EOF
          
          # Create redirect-script.js for index.html
          cat > public/redirect-script.js << 'EOF'
          // Single Page Apps for GitHub Pages
          // MIT License
          // https://github.com/rafgraph/spa-github-pages
          (function(l) {
            if (l.search[1] === "/") {
              var decoded = l.search.slice(1).split("&").map(function(s) { 
                return s.replace(/~and~/g, "&")
              }).join("?");
              window.history.replaceState(null, null,
                l.pathname.slice(0, -1) + decoded + l.hash
              );
            }
          }(window.location))
          EOF
      
      - name: Fix supabase/client.ts to handle missing env variables
        run: |
          cat > src/integrations/supabase/client.ts << 'EOF'
          import { createClient } from "@supabase/supabase-js";

          // Use environment variables or fallback to hardcoded values (only for public demo purposes)
          const supabaseUrl = import.meta.env.VITE_SUPABASE_URL || "https://mhbhyimkykyvuphbefwg.supabase.co";
          const supabaseAnonKey = import.meta.env.VITE_SUPABASE_ANON_KEY || "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oYmh5aW1reWt5dnVwaGJlZndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE3NjE3MjEsImV4cCI6MjA1NzMzNzcyMX0.q42WQ2LzGfzxch1ghkMOoArCGNo0jxfiqOwY9SQsXnQ";

          if (!supabaseUrl || !supabaseAnonKey) {
            console.error("Missing Supabase environment variables. Using fallbacks if available.");
          }

          export const supabase = createClient(supabaseUrl, supabaseAnonKey);
          EOF
      
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://mhbhyimkykyvuphbefwg.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oYmh5aW1reWt5dnVwaGJlZndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE3NjE3MjEsImV4cCI6MjA1NzMzNzcyMX0.q42WQ2LzGfzxch1ghkMOoArCGNo0jxfiqOwY9SQsXnQ"
          VITE_USE_REAL_AI: "true"
      
      - name: Add SPA routing script to index.html
        run: |
          # Copy the redirect script to the dist folder
          cp public/redirect-script.js dist/
          
          # Add the script tag to index.html
          sed -i 's/<head>/<head>\n    <script type="text\/javascript" src="\/rafiki-guidance-hub-66\/redirect-script.js"><\/script>/' dist/index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
